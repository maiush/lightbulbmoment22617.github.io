<!DOCTYPE html>
<html lang="en-us">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Firefly Test</title>
  <link rel="stylesheet" href="/css/style.css" />
  <link rel="stylesheet" href="/css/fonts.css" />
</head>

<body class="home">
  <canvas id="particle-canvas"></canvas>

  <div class="theme-switch-wrapper">
    <div class="pull-chain" id="theme-toggle">
      <div class="chain"></div>
      <div class="pull-handle"></div>
    </div>
  </div>

  <div class="lantern-overlay" id="lantern-overlay"></div>

  <header class="masthead">
  <h1><a href="/">Sharan Maiya</a></h1>
  <nav class="menu">
    <ul>
      <li><a href="/">About</a></li>
      <li><a href="/cv/">CV</a></li>
    </ul>
  </nav>
  </header>
  <article class="main">
  <p>Firefly particle test. Use the pull chain to cycle through all three themes.</p>
  </article>

  <script>
    const canvas = document.getElementById('particle-canvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resizeCanvas();
    window.addEventListener('resize', resizeCanvas);

    const fireflies = [];
    const fireflyCount = 18;

    class Firefly {
      constructor() {
        this.x = Math.random() * canvas.width;
        this.y = Math.random() * canvas.height;
        this.size = Math.random() * 2.5 + 1.5;
        // slow, random drift
        this.vx = (Math.random() - 0.5) * 0.3;
        this.vy = (Math.random() - 0.5) * 0.3;
        // pulsing glow
        this.phase = Math.random() * Math.PI * 2;
        this.pulseSpeed = Math.random() * 0.015 + 0.008;
        this.maxOpacity = Math.random() * 0.5 + 0.3;
        // occasional direction change
        this.changeTimer = Math.random() * 300 + 200;
        this.timer = 0;
      }

      update() {
        this.x += this.vx;
        this.y += this.vy;
        this.phase += this.pulseSpeed;

        // wrap around edges with padding
        if (this.x < -20) this.x = canvas.width + 20;
        if (this.x > canvas.width + 20) this.x = -20;
        if (this.y < -20) this.y = canvas.height + 20;
        if (this.y > canvas.height + 20) this.y = -20;

        // gently shift direction sometimes
        this.timer++;
        if (this.timer > this.changeTimer) {
          this.vx = (Math.random() - 0.5) * 0.3;
          this.vy = (Math.random() - 0.5) * 0.3;
          this.changeTimer = Math.random() * 300 + 200;
          this.timer = 0;
        }
      }

      draw() {
        const theme = document.documentElement.getAttribute('data-theme');
        // pulse between 0 and maxOpacity
        const pulse = (Math.sin(this.phase) + 1) / 2;
        const opacity = pulse * this.maxOpacity;

        let r, g, b;
        if (theme === 'extra-dark') {
          // warm golden glow
          r = 255; g = 210; b = 80;
        } else if (theme === 'dark') {
          // cool pale blue
          r = 160; g = 200; b = 255;
        } else {
          // subtle warm mote
          r = 120; g = 140; b = 100;
        }

        // soft glow halo
        const gradient = ctx.createRadialGradient(
          this.x, this.y, 0,
          this.x, this.y, this.size * 4
        );
        gradient.addColorStop(0, `rgba(${r}, ${g}, ${b}, ${opacity})`);
        gradient.addColorStop(0.3, `rgba(${r}, ${g}, ${b}, ${opacity * 0.4})`);
        gradient.addColorStop(1, `rgba(${r}, ${g}, ${b}, 0)`);

        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 4, 0, Math.PI * 2);
        ctx.fill();

        // bright core
        ctx.fillStyle = `rgba(${r}, ${g}, ${b}, ${opacity * 1.2})`;
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size * 0.5, 0, Math.PI * 2);
        ctx.fill();
      }
    }

    for (let i = 0; i < fireflyCount; i++) {
      fireflies.push(new Firefly());
    }

    function animate() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      fireflies.forEach(f => {
        f.update();
        f.draw();
      });
      requestAnimationFrame(animate);
    }

    animate();
  </script>

  <script src="/js/theme.js"></script>
</body>
</html>
